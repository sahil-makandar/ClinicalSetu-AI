AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ClinicalSetu - AI-Powered Clinical Intelligence Bridge
  One-click deployment: Lambda + API Gateway + S3 (Frontend) + IAM + Bedrock permissions

# ============================================================
# PARAMETERS - Customize your deployment
# ============================================================
Parameters:
  ProjectName:
    Type: String
    Default: clinicalsetu
    Description: Name prefix for all resources

  BedrockModelId:
    Type: String
    Default: us.amazon.nova-lite-v1:0
    Description: Primary Bedrock model (Amazon Nova Lite for cost efficiency)

  FallbackModelId:
    Type: String
    Default: us.amazon.nova-micro-v1:0
    Description: Fallback Bedrock model if primary is throttled (AWS-native)

  KnowledgeBaseId:
    Type: String
    Default: ''
    Description: (Optional) Bedrock Knowledge Base ID for RAG trial matching

  LambdaS3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment ZIP

  LambdaS3Key:
    Type: String
    Default: lambda_deployment.zip
    Description: S3 key for the Lambda deployment ZIP

  AgentLambdaS3Key:
    Type: String
    Default: agent_lambda_deployment.zip
    Description: S3 key for the Agent Lambda deployment ZIP

  BedrockAgentId:
    Type: String
    Default: ''
    Description: (Optional) Bedrock Supervisor Agent ID for multi-agent mode

  BedrockAgentAliasId:
    Type: String
    Default: ''
    Description: (Optional) Bedrock Supervisor Agent Alias ID

  TrialsBucket:
    Type: String
    Default: ''
    Description: (Optional) S3 bucket for clinical trial data

  DataSourceId:
    Type: String
    Default: ''
    Description: (Optional) Bedrock KB data source ID for trial sync

  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Deployment stage

# ============================================================
# CONDITIONS
# ============================================================
Conditions:
  HasKnowledgeBase: !Not [!Equals [!Ref KnowledgeBaseId, '']]
  HasBedrockAgent: !Not [!Equals [!Ref BedrockAgentId, '']]
  HasTrialsBucket: !Not [!Equals [!Ref TrialsBucket, '']]

# ============================================================
# RESOURCES
# ============================================================
Resources:

  # ----------------------------------------------------------
  # IAM Role for Lambda with Bedrock permissions
  # ----------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role-${Stage}-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Converse
                  - bedrock:ConverseStream
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/*'
                  - !Sub 'arn:aws:bedrock:us-east-1::foundation-model/*'
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: '*'
        - PolicyName: DynamoDBCacheAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt CacheTable.Arn
        - PolicyName: DynamoDBVisitsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt VisitsTable.Arn
                  - !Sub '${VisitsTable.Arn}/index/*'

  # ----------------------------------------------------------
  # DynamoDB Table - Response Cache (25GB always free tier)
  # ----------------------------------------------------------
  CacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-cache-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cache_key
          AttributeType: S
      KeySchema:
        - AttributeName: cache_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # DynamoDB Table - Patient Visit Records
  # ----------------------------------------------------------
  VisitsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-visits-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: phone_number
          AttributeType: S
        - AttributeName: visit_date
          AttributeType: S
        - AttributeName: doctor_name
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: phone-index
          KeySchema:
            - AttributeName: phone_number
              KeyType: HASH
            - AttributeName: visit_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: doctor-index
          KeySchema:
            - AttributeName: doctor_name
              KeyType: HASH
            - AttributeName: visit_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # Lambda Function - Main API Handler
  # ----------------------------------------------------------
  ProcessConsultationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-api-${Stage}'
      Description: Processes clinical consultations through Amazon Bedrock
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 120
      MemorySize: 1024
      Environment:
        Variables:
          AWS_REGION_NAME: !Ref AWS::Region
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          BEDROCK_FALLBACK_MODEL_ID: !Ref FallbackModelId
          KNOWLEDGE_BASE_ID: !Ref KnowledgeBaseId
          DYNAMODB_CACHE_TABLE: !Ref CacheTable
          CACHE_ENABLED: 'true'
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # Lambda Function - Agent Tool Executor (called by Bedrock Agent)
  # ----------------------------------------------------------
  ToolExecutorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-tool-executor-${Stage}'
      Description: Tool executor Lambda invoked by Bedrock Agent collaborators
      Runtime: python3.12
      Handler: agent_tool_executor.lambda_handler
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref AgentLambdaS3Key
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          AWS_REGION_NAME: !Ref AWS::Region
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          BEDROCK_FALLBACK_MODEL_ID: !Ref FallbackModelId
          KNOWLEDGE_BASE_ID: !Ref KnowledgeBaseId
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # Lambda Function - Agent Invoker (called by API Gateway)
  # ----------------------------------------------------------
  AgentInvokerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-agent-invoker-${Stage}'
      Description: Invokes Bedrock Supervisor Agent for multi-agent clinical processing
      Runtime: python3.12
      Handler: invoke_agent.lambda_handler
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref AgentLambdaS3Key
      Role: !GetAtt AgentInvokerRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          AWS_REGION_NAME: !Ref AWS::Region
          AWS_REGION: !Ref AWS::Region
          BEDROCK_AGENT_ID: !Ref BedrockAgentId
          BEDROCK_AGENT_ALIAS_ID: !Ref BedrockAgentAliasId
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          DYNAMODB_CACHE_TABLE: !Ref CacheTable
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # IAM Role for Agent Invoker Lambda (needs bedrock:InvokeAgent)
  AgentInvokerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-agent-invoker-role-${Stage}-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAgentAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent-alias/*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Converse
                  - bedrock:ConverseStream
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/*'
                  - !Sub 'arn:aws:bedrock:us-east-1::foundation-model/*'
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt CacheTable.Arn
                  - !GetAtt VisitsTable.Arn
                  - !Sub '${VisitsTable.Arn}/index/*'

  # ----------------------------------------------------------
  # Lambda Function - Trial Fetcher (scheduled daily via EventBridge)
  # ----------------------------------------------------------
  TrialFetcherFunction:
    Type: AWS::Lambda::Function
    Condition: HasTrialsBucket
    Properties:
      FunctionName: !Sub '${ProjectName}-trial-fetcher-${Stage}'
      Description: Fetches clinical trials from ClinicalTrials.gov and syncs to Bedrock KB
      Runtime: python3.12
      Handler: fetch_trials.lambda_handler
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref AgentLambdaS3Key
      Role: !GetAtt TrialFetcherRole.Arn
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          AWS_REGION_NAME: !Ref AWS::Region
          TRIALS_BUCKET: !Ref TrialsBucket
          KNOWLEDGE_BASE_ID: !Ref KnowledgeBaseId
          DATA_SOURCE_ID: !Ref DataSourceId
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  TrialFetcherRole:
    Type: AWS::IAM::Role
    Condition: HasTrialsBucket
    Properties:
      RoleName: !Sub '${ProjectName}-trial-fetcher-role-${Stage}-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TrialFetcherAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${TrialsBucket}'
                  - !Sub 'arn:aws:s3:::${TrialsBucket}/*'
              - Effect: Allow
                Action:
                  - bedrock:StartIngestionJob
                Resource: '*'

  TrialFetchSchedule:
    Type: AWS::Events::Rule
    Condition: HasTrialsBucket
    Properties:
      Name: !Sub '${ProjectName}-trial-fetch-daily-${Stage}'
      Description: Daily clinical trial data refresh from ClinicalTrials.gov
      ScheduleExpression: 'rate(1 day)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt TrialFetcherFunction.Arn
          Id: TrialFetcherTarget

  TrialFetchSchedulePermission:
    Type: AWS::Lambda::Permission
    Condition: HasTrialsBucket
    Properties:
      FunctionName: !Ref TrialFetcherFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt TrialFetchSchedule.Arn

  # ----------------------------------------------------------
  # Lambda Function - Visit API (save/fetch patient visits)
  # ----------------------------------------------------------
  VisitApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-visit-api-${Stage}'
      Description: Handles saving and retrieving patient visit records
      Runtime: python3.12
      Handler: visit_api.lambda_handler
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref AgentLambdaS3Key
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          VISITS_TABLE: !Ref VisitsTable
          AWS_REGION_NAME: !Ref AWS::Region
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # API Gateway - REST API
  # ----------------------------------------------------------
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ProjectName}-api-${Stage}'
      Description: ClinicalSetu REST API
      EndpointConfiguration:
        Types:
          - REGIONAL

  # /api resource
  ApiResourceApi:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: api

  # /api/process-agent resource (multi-agent path)
  ApiResourceProcessAgent:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ApiResourceApi
      PathPart: process-agent

  # POST /api/process-agent - Agent Invoker Lambda integration
  ApiMethodProcessAgent:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceProcessAgent
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AgentInvokerFunction.Arn}/invocations'

  # OPTIONS /api/process-agent - CORS preflight
  ApiMethodProcessAgentOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceProcessAgent
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # Lambda permission for API Gateway to invoke Agent Invoker
  AgentInvokerApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AgentInvokerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # /api/translate resource
  ApiResourceTranslate:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ApiResourceApi
      PathPart: translate

  # POST /api/translate - Lambda integration
  ApiMethodTranslate:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceTranslate
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ProcessConsultationFunction.Arn}/invocations'

  # OPTIONS /api/translate - CORS preflight
  ApiMethodTranslateOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceTranslate
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /api/save-visit resource
  ApiResourceSaveVisit:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ApiResourceApi
      PathPart: save-visit

  # POST /api/save-visit
  ApiMethodSaveVisit:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceSaveVisit
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${VisitApiFunction.Arn}/invocations'

  # OPTIONS /api/save-visit
  ApiMethodSaveVisitOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceSaveVisit
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /api/patient-visits resource
  ApiResourcePatientVisits:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ApiResourceApi
      PathPart: patient-visits

  # POST /api/patient-visits
  ApiMethodPatientVisits:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourcePatientVisits
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${VisitApiFunction.Arn}/invocations'

  # OPTIONS /api/patient-visits
  ApiMethodPatientVisitsOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourcePatientVisits
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /api/doctor-visits resource
  ApiResourceDoctorVisits:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ApiResourceApi
      PathPart: doctor-visits

  # POST /api/doctor-visits
  ApiMethodDoctorVisits:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceDoctorVisits
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${VisitApiFunction.Arn}/invocations'

  # OPTIONS /api/doctor-visits
  ApiMethodDoctorVisitsOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceDoctorVisits
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # Lambda permission for API Gateway to invoke Visit API
  VisitApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref VisitApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # Lambda permission for API Gateway to invoke
  LambdaApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessConsultationFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # Deploy the API
  ApiDeploymentV4:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiMethodProcessAgent
      - ApiMethodProcessAgentOptions
      - ApiMethodTranslate
      - ApiMethodTranslateOptions
      - ApiMethodSaveVisit
      - ApiMethodSaveVisitOptions
      - ApiMethodPatientVisits
      - ApiMethodPatientVisitsOptions
      - ApiMethodDoctorVisits
      - ApiMethodDoctorVisitsOptions
    Properties:
      RestApiId: !Ref ApiGateway

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiDeploymentV4
      StageName: !Ref Stage
      Description: !Sub '${ProjectName} ${Stage} stage'

  # ----------------------------------------------------------
  # S3 Bucket - Frontend Static Hosting
  # ----------------------------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-frontend-${AWS::AccountId}-${Stage}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET]
            AllowedOrigins: ['*']

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'

  # ----------------------------------------------------------
  # CloudFront Distribution (CDN for frontend)
  # ----------------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${ProjectName} Frontend CDN'
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100

  # ----------------------------------------------------------
  # Cognito Identity Pool (unauthenticated access for Transcribe Medical)
  # ----------------------------------------------------------
  TranscribeIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub '${ProjectName}-transcribe-pool-${Stage}'
      AllowUnauthenticatedIdentities: true

  TranscribeUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-transcribe-unauth-${Stage}-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref TranscribeIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: TranscribeMedicalAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - transcribe:StartStreamTranscriptionWebSocket
                  - transcribe:StartStreamTranscription
                  - transcribe:StartMedicalStreamTranscription
                  - transcribe:StartMedicalStreamTranscriptionWebSocket
                Resource: '*'

  TranscribeIdentityPoolRoles:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref TranscribeIdentityPool
      Roles:
        unauthenticated: !GetAtt TranscribeUnauthRole.Arn

# ============================================================
# OUTPUTS
# ============================================================
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: !Sub '${ProjectName}-ApiUrl-${Stage}'

  ApiTranslateEndpoint:
    Description: Full URL for the /api/translate endpoint
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/api/translate'

  FrontendBucketName:
    Description: S3 bucket for frontend files
    Value: !Ref FrontendBucket

  FrontendWebsiteUrl:
    Description: S3 website URL (HTTP)
    Value: !GetAtt FrontendBucket.WebsiteURL

  CloudFrontUrl:
    Description: CloudFront distribution URL (HTTPS)
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ProcessConsultationFunction.Arn

  LambdaRoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt LambdaExecutionRole.Arn

  CacheTableName:
    Description: DynamoDB cache table name
    Value: !Ref CacheTable

  CacheTableArn:
    Description: DynamoDB cache table ARN
    Value: !GetAtt CacheTable.Arn

  VisitsTableName:
    Description: DynamoDB visits table name
    Value: !Ref VisitsTable

  CognitoIdentityPoolId:
    Description: Cognito Identity Pool ID for Transcribe Medical access
    Value: !Ref TranscribeIdentityPool

  ToolExecutorFunctionArn:
    Description: Tool Executor Lambda ARN (for Bedrock Agent action groups)
    Value: !GetAtt ToolExecutorFunction.Arn

  AgentInvokerFunctionArn:
    Description: Agent Invoker Lambda ARN
    Value: !GetAtt AgentInvokerFunction.Arn

  ApiProcessAgentEndpoint:
    Description: Full URL for the /api/process-agent endpoint (multi-agent)
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/api/process-agent'

  TrialFetcherFunctionArn:
    Condition: HasTrialsBucket
    Description: Trial Fetcher Lambda ARN
    Value: !GetAtt TrialFetcherFunction.Arn
