AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ClinicalSetu - AI-Powered Clinical Intelligence Bridge
  One-click deployment: Lambda + API Gateway + S3 (Frontend) + IAM + Bedrock permissions

# ============================================================
# PARAMETERS - Customize your deployment
# ============================================================
Parameters:
  ProjectName:
    Type: String
    Default: ClinicalSetu
    Description: Name prefix for all resources

  BedrockModelId:
    Type: String
    Default: us.amazon.nova-lite-v1:0
    Description: Primary Bedrock model (Amazon Nova Lite for cost efficiency)

  FallbackModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Fallback Bedrock model if primary is throttled

  KnowledgeBaseId:
    Type: String
    Default: ''
    Description: (Optional) Bedrock Knowledge Base ID for RAG trial matching

  LambdaS3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment ZIP

  LambdaS3Key:
    Type: String
    Default: lambda_deployment.zip
    Description: S3 key for the Lambda deployment ZIP

  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Deployment stage

# ============================================================
# CONDITIONS
# ============================================================
Conditions:
  HasKnowledgeBase: !Not [!Equals [!Ref KnowledgeBaseId, '']]

# ============================================================
# RESOURCES
# ============================================================
Resources:

  # ----------------------------------------------------------
  # IAM Role for Lambda with Bedrock permissions
  # ----------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-LambdaRole-${Stage}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Converse
                  - bedrock:ConverseStream
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/*'
                  - !Sub 'arn:aws:bedrock:us-east-1::foundation-model/*'
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: '*'
        - PolicyName: DynamoDBCacheAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt CacheTable.Arn

  # ----------------------------------------------------------
  # DynamoDB Table - Response Cache (25GB always free tier)
  # ----------------------------------------------------------
  CacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-Cache-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cache_key
          AttributeType: S
      KeySchema:
        - AttributeName: cache_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # Lambda Function - Main API Handler
  # ----------------------------------------------------------
  ProcessConsultationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-API-${Stage}'
      Description: Processes clinical consultations through Amazon Bedrock
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 120
      MemorySize: 1024
      Environment:
        Variables:
          AWS_REGION_NAME: !Ref AWS::Region
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          BEDROCK_FALLBACK_MODEL_ID: !Ref FallbackModelId
          KNOWLEDGE_BASE_ID: !Ref KnowledgeBaseId
          DYNAMODB_CACHE_TABLE: !Ref CacheTable
          CACHE_ENABLED: 'true'
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # API Gateway - REST API
  # ----------------------------------------------------------
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ProjectName}-API-${Stage}'
      Description: ClinicalSetu REST API
      EndpointConfiguration:
        Types:
          - REGIONAL

  # /api resource
  ApiResourceApi:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: api

  # /api/process resource
  ApiResourceProcess:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ApiResourceApi
      PathPart: process

  # /api/translate resource
  ApiResourceTranslate:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ApiResourceApi
      PathPart: translate

  # POST /api/process - Lambda integration
  ApiMethodProcess:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceProcess
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ProcessConsultationFunction.Arn}/invocations'

  # OPTIONS /api/process - CORS preflight
  ApiMethodProcessOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceProcess
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # POST /api/translate - Lambda integration
  ApiMethodTranslate:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceTranslate
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ProcessConsultationFunction.Arn}/invocations'

  # OPTIONS /api/translate - CORS preflight
  ApiMethodTranslateOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResourceTranslate
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # Lambda permission for API Gateway to invoke
  LambdaApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessConsultationFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # Deploy the API
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiMethodProcess
      - ApiMethodProcessOptions
      - ApiMethodTranslate
      - ApiMethodTranslateOptions
    Properties:
      RestApiId: !Ref ApiGateway

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Stage
      Description: !Sub '${ProjectName} ${Stage} stage'

  # ----------------------------------------------------------
  # S3 Bucket - Frontend Static Hosting
  # ----------------------------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-frontend-${AWS::AccountId}-${Stage}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET]
            AllowedOrigins: ['*']

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'

  # ----------------------------------------------------------
  # CloudFront Distribution (CDN for frontend)
  # ----------------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${ProjectName} Frontend CDN'
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100

  # ----------------------------------------------------------
  # Cognito Identity Pool (unauthenticated access for Transcribe Medical)
  # ----------------------------------------------------------
  TranscribeIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub '${ProjectName}-TranscribePool-${Stage}'
      AllowUnauthenticatedIdentities: true

  TranscribeUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-TranscribeUnauth-${Stage}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref TranscribeIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: TranscribeMedicalAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - transcribe:StartStreamTranscriptionWebSocket
                  - transcribe:StartStreamTranscription
                  - transcribe:StartMedicalStreamTranscription
                  - transcribe:StartMedicalStreamTranscriptionWebSocket
                Resource: '*'

  TranscribeIdentityPoolRoles:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref TranscribeIdentityPool
      Roles:
        unauthenticated: !GetAtt TranscribeUnauthRole.Arn

# ============================================================
# OUTPUTS
# ============================================================
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: !Sub '${ProjectName}-ApiUrl-${Stage}'

  ApiProcessEndpoint:
    Description: Full URL for the /api/process endpoint
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/api/process'

  ApiTranslateEndpoint:
    Description: Full URL for the /api/translate endpoint
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/api/translate'

  FrontendBucketName:
    Description: S3 bucket for frontend files
    Value: !Ref FrontendBucket

  FrontendWebsiteUrl:
    Description: S3 website URL (HTTP)
    Value: !GetAtt FrontendBucket.WebsiteURL

  CloudFrontUrl:
    Description: CloudFront distribution URL (HTTPS)
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ProcessConsultationFunction.Arn

  LambdaRoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt LambdaExecutionRole.Arn

  CacheTableName:
    Description: DynamoDB cache table name
    Value: !Ref CacheTable

  CacheTableArn:
    Description: DynamoDB cache table ARN
    Value: !GetAtt CacheTable.Arn

  CognitoIdentityPoolId:
    Description: Cognito Identity Pool ID for Transcribe Medical access
    Value: !Ref TranscribeIdentityPool
