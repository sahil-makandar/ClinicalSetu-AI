name: Deploy ClinicalSetu to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: clinicalsetu
  STACK_NAME: clinicalsetu-stack
  STAGE: prod

jobs:
  deploy:
    name: Deploy Backend + Frontend
    runs-on: ubuntu-latest

    steps:
      # ----- Checkout -----
      - name: Checkout code
        uses: actions/checkout@v4

      # ----- AWS Credentials -----
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ----- Python (for Lambda packaging + scripts) -----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install boto3 opensearch-py requests-aws4auth

      # ----- Node.js (for frontend build) -----
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ----- Step 1: Fetch Clinical Trial Data (before packaging) -----
      - name: Fetch clinical trial data from ClinicalTrials.gov
        run: |
          python backend/lambda/fetch_trials.py --local --test
          python backend/lambda/fetch_trials.py --local
          TRIAL_COUNT=$(ls data/trials/*.json 2>/dev/null | wc -l)
          echo "Trials fetched: $TRIAL_COUNT"

      # ----- Step 2: Package Lambda -----
      - name: Package Lambda functions
        run: python scripts/package_lambda.py

      # ----- Step 3: Upload Lambda ZIPs to S3 -----
      - name: Get AWS Account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Create S3 bucket for Lambda (if not exists)
        run: |
          BUCKET="${{ env.PROJECT_NAME }}-lambda-${{ steps.account.outputs.id }}-${{ env.AWS_REGION }}"
          echo "LAMBDA_BUCKET=$BUCKET" >> $GITHUB_ENV
          aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null || \
            aws s3api create-bucket --bucket "$BUCKET" --region ${{ env.AWS_REGION }}

      - name: Upload Lambda ZIPs to S3
        run: |
          aws s3 cp lambda_deployment.zip "s3://${{ env.LAMBDA_BUCKET }}/lambda_deployment.zip"
          aws s3 cp agent_lambda_deployment.zip "s3://${{ env.LAMBDA_BUCKET }}/agent_lambda_deployment.zip"

      # ----- Step 3.5: Handle failed stack state -----
      - name: Continue rollback if stack is in failed state
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          
          echo "Current stack status: $STACK_STATUS"
          
          if [ "$STACK_STATUS" = "UPDATE_ROLLBACK_FAILED" ] || [ "$STACK_STATUS" = "CREATE_FAILED" ]; then
            echo "Stack is in failed state. Attempting to continue rollback..."
            aws cloudformation continue-update-rollback --stack-name ${{ env.STACK_NAME }} || true
            
            # Wait for rollback to complete
            echo "Waiting for rollback to complete..."
            aws cloudformation wait stack-rollback-complete --stack-name ${{ env.STACK_NAME }} || true
            
            # Delete the stack if rollback succeeded
            echo "Deleting failed stack..."
            aws cloudformation delete-stack --stack-name ${{ env.STACK_NAME }}
            aws cloudformation wait stack-delete-complete --stack-name ${{ env.STACK_NAME }} || true
            echo "Stack deleted. Will create fresh stack."
          elif [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack is in ROLLBACK_COMPLETE state. Deleting..."
            aws cloudformation delete-stack --stack-name ${{ env.STACK_NAME }}
            aws cloudformation wait stack-delete-complete --stack-name ${{ env.STACK_NAME }}
            echo "Stack deleted. Will create fresh stack."
          fi

      # ----- Step 4: Deploy CloudFormation -----
      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              ProjectName=${{ env.PROJECT_NAME }} \
              Stage=${{ env.STAGE }} \
              LambdaS3Bucket=${{ env.LAMBDA_BUCKET }} \
              LambdaS3Key=lambda_deployment.zip \
              AgentLambdaS3Key=agent_lambda_deployment.zip \
              BedrockModelId="us.amazon.nova-lite-v1:0" \
              FallbackModelId="us.amazon.nova-micro-v1:0" \
              BedrockAgentId="${{ vars.BEDROCK_AGENT_ID || '' }}" \
              BedrockAgentAliasId="${{ vars.BEDROCK_AGENT_ALIAS_ID || '' }}" \
              KnowledgeBaseId="${{ vars.KNOWLEDGE_BASE_ID || '' }}" \
              TrialsBucket="${{ vars.TRIALS_BUCKET || '' }}" \
              DataSourceId="${{ vars.DATA_SOURCE_ID || '' }}" \
            --no-fail-on-empty-changeset

      # ----- Step 4.5: Setup Multi-Agent (one-time, idempotent) -----
      - name: Setup Bedrock Multi-Agent Collaboration
        if: vars.MULTI_AGENT_SETUP_DONE != 'true'
        run: |
          # Get the tool executor Lambda name from CloudFormation
          TOOL_LAMBDA=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ToolExecutorFunctionArn'].OutputValue" \
            --output text)

          TOOL_LAMBDA_NAME=$(echo "$TOOL_LAMBDA" | sed 's/.*function://')
          echo "Tool Executor Lambda: $TOOL_LAMBDA_NAME"

          # Run the multi-agent setup script
          TOOL_LAMBDA_NAME="$TOOL_LAMBDA_NAME" python scripts/setup_multi_agent.py 2>&1 | tee /tmp/agent_setup.log

          # Extract agent ID and alias ID from output
          AGENT_ID=$(grep "BEDROCK_AGENT_ID=" /tmp/agent_setup.log | tail -1 | cut -d= -f2)
          ALIAS_ID=$(grep "BEDROCK_AGENT_ALIAS_ID=" /tmp/agent_setup.log | tail -1 | cut -d= -f2)

          echo "Supervisor Agent ID: $AGENT_ID"
          echo "Supervisor Alias ID: $ALIAS_ID"

          if [ -n "$AGENT_ID" ] && [ -n "$ALIAS_ID" ]; then
            # Update the Agent Invoker Lambda with the agent IDs
            INVOKER_NAME="${{ env.PROJECT_NAME }}-agent-invoker-${{ env.STAGE }}"
            aws lambda update-function-configuration \
              --function-name "$INVOKER_NAME" \
              --environment "Variables={AWS_REGION_NAME=${{ env.AWS_REGION }},BEDROCK_AGENT_ID=$AGENT_ID,BEDROCK_AGENT_ALIAS_ID=$ALIAS_ID,BEDROCK_MODEL_ID=us.amazon.nova-lite-v1:0}" \
              --no-cli-pager

            echo "AGENT_ID=$AGENT_ID" >> $GITHUB_ENV
            echo "ALIAS_ID=$ALIAS_ID" >> $GITHUB_ENV
            echo "Multi-agent setup complete! Set MULTI_AGENT_SETUP_DONE=true in repo variables to skip next time."
          else
            echo "WARNING: Could not extract agent IDs. Check setup script output above."
          fi

      # ----- Step 4.6: Setup Bedrock Knowledge Base for RAG (one-time) -----
      - name: Setup Bedrock Knowledge Base for RAG
        if: vars.KNOWLEDGE_BASE_SETUP_DONE != 'true'
        run: |
          python scripts/setup_knowledge_base.py 2>&1 | tee /tmp/kb_setup.log

          KB_ID=$(grep "KNOWLEDGE_BASE_ID=" /tmp/kb_setup.log | tail -1 | cut -d= -f2)
          TRIALS_BUCKET=$(grep "TRIALS_BUCKET=" /tmp/kb_setup.log | tail -1 | cut -d= -f2)
          DS_ID=$(grep "DATA_SOURCE_ID=" /tmp/kb_setup.log | tail -1 | cut -d= -f2)

          echo "Knowledge Base ID: $KB_ID"
          echo "Trials Bucket: $TRIALS_BUCKET"
          echo "Data Source ID: $DS_ID"

          if [ -n "$KB_ID" ]; then
            # Update Tool Executor Lambda with KB ID
            TOOL_EXECUTOR_NAME="${{ env.PROJECT_NAME }}-tool-executor-${{ env.STAGE }}"
            aws lambda update-function-configuration \
              --function-name "$TOOL_EXECUTOR_NAME" \
              --environment "Variables={AWS_REGION_NAME=${{ env.AWS_REGION }},BEDROCK_MODEL_ID=us.amazon.nova-lite-v1:0,BEDROCK_FALLBACK_MODEL_ID=us.amazon.nova-micro-v1:0,KNOWLEDGE_BASE_ID=$KB_ID}" \
              --no-cli-pager

            # Update Trial Fetcher Lambda with KB + bucket info
            FETCHER_NAME="${{ env.PROJECT_NAME }}-trial-fetcher-${{ env.STAGE }}"
            aws lambda update-function-configuration \
              --function-name "$FETCHER_NAME" \
              --environment "Variables={AWS_REGION_NAME=${{ env.AWS_REGION }},TRIALS_BUCKET=$TRIALS_BUCKET,KNOWLEDGE_BASE_ID=$KB_ID,DATA_SOURCE_ID=$DS_ID}" \
              --no-cli-pager 2>/dev/null || echo "Trial Fetcher Lambda not yet deployed (will be on next deploy)"

            echo "KB_ID=$KB_ID" >> $GITHUB_ENV
            echo "TRIALS_BUCKET_NAME=$TRIALS_BUCKET" >> $GITHUB_ENV
            echo "Knowledge Base setup complete! Set KNOWLEDGE_BASE_SETUP_DONE=true in repo variables to skip next time."
          else
            echo "WARNING: Could not extract KB ID. Check setup script output above."
          fi

      # ----- Step 4.7: Seed synthetic visit data (idempotent) -----
      - name: Seed synthetic visit data
        if: vars.SEED_DATA_DONE != 'true'
        run: |
          VISITS_TABLE=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='VisitsTableName'].OutputValue" \
            --output text 2>/dev/null || echo "clinicalsetu-visits-prod")
          # Fallback if output not found
          if [ "$VISITS_TABLE" = "None" ] || [ -z "$VISITS_TABLE" ]; then
            VISITS_TABLE="${{ env.PROJECT_NAME }}-visits-${{ env.STAGE }}"
          fi
          echo "Seeding visits table: $VISITS_TABLE"
          VISITS_TABLE="$VISITS_TABLE" AWS_REGION="${{ env.AWS_REGION }}" python scripts/seed_visits.py
          echo "Set SEED_DATA_DONE=true in repo variables to skip next time."

      # ----- Step 5: Get Stack Outputs -----
      - name: Get stack outputs
        id: stack
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          CLOUDFRONT_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontUrl'].OutputValue" \
            --output text)
          COGNITO_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoIdentityPoolId'].OutputValue" \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront_url=$CLOUDFRONT_URL" >> $GITHUB_OUTPUT
          echo "cognito_pool_id=$COGNITO_POOL_ID" >> $GITHUB_OUTPUT

      # ----- Step 6: Build Frontend -----
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.stack.outputs.api_url }}
          VITE_COGNITO_IDENTITY_POOL_ID: ${{ steps.stack.outputs.cognito_pool_id }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
        run: npm run build

      # ----- Step 7: Deploy Frontend to S3 -----
      - name: Sync frontend to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ "s3://${{ steps.stack.outputs.frontend_bucket }}/" \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"
          aws s3 cp dist/index.html "s3://${{ steps.stack.outputs.frontend_bucket }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      # ----- Step 8: Invalidate CloudFront cache -----
      - name: Get CloudFront Distribution ID
        id: cf
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${{ env.PROJECT_NAME }} Frontend CDN'].Id" \
            --output text)
          echo "dist_id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Invalidate CloudFront cache
        if: steps.cf.outputs.dist_id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cf.outputs.dist_id }} \
            --paths "/*"

      # ----- Summary -----
      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ steps.stack.outputs.cloudfront_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API (multi-agent) | ${{ steps.stack.outputs.api_url }}/api/process-agent |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### AWS Services Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Lambda x4 (Python 3.12) - Monolithic + Agent Invoker + Tool Executor + Trial Fetcher" >> $GITHUB_STEP_SUMMARY
          echo "- API Gateway (REST) - HTTPS endpoint" >> $GITHUB_STEP_SUMMARY
          echo "- S3 - Frontend hosting + Lambda code + Clinical trial data" >> $GITHUB_STEP_SUMMARY
          echo "- CloudFront - CDN with HTTPS" >> $GITHUB_STEP_SUMMARY
          echo "- DynamoDB - Response caching" >> $GITHUB_STEP_SUMMARY
          echo "- Amazon Bedrock - Nova Lite (primary) + Nova Micro (fallback)" >> $GITHUB_STEP_SUMMARY
          echo "- Bedrock Multi-Agent Collaboration - Supervisor + 4 Specialists" >> $GITHUB_STEP_SUMMARY
          echo "- Bedrock Knowledge Base - RAG for clinical trial matching (Titan Embeddings v2 + OpenSearch Serverless)" >> $GITHUB_STEP_SUMMARY
          echo "- EventBridge - Daily clinical trial data refresh from ClinicalTrials.gov" >> $GITHUB_STEP_SUMMARY
          echo "- Cognito Identity Pool - Transcribe Medical access" >> $GITHUB_STEP_SUMMARY
          echo "- Amazon Transcribe Medical - Clinical speech-to-text" >> $GITHUB_STEP_SUMMARY
          echo "- CloudFormation - Infrastructure as Code" >> $GITHUB_STEP_SUMMARY
